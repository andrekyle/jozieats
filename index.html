<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <title>Jozi Eats — Food Delivery</title>
    <meta name="description" content="Order food from the best local restaurants. Fast delivery, great prices." />
    <meta name="theme-color" content="#262626" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Jozi Eats" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <meta property="og:title" content="Jozi Eats — Food Delivery" />
    <meta property="og:description" content="Order food from the best local restaurants." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <!-- Privacy policy discoverable by crawlers -->
    <link rel="privacy-policy" href="/privacy-policy" />
    <link rel="terms-of-service" href="/terms" />
  </head>
  <body>
    <script>
      (function() {
        var t = localStorage.getItem('jozieats-theme') || 'dark';
        var d = t === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : t;
        document.documentElement.classList.add(d);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
